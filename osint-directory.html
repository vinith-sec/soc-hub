function render(){
  const nav=document.getElementById('cat-nav');
  const main=document.getElementById('categories');
  let total=0,free=0,login=0,paid=0;
  CATS.forEach(c=>{
    nav.innerHTML+=`<a href="#${c.id}">${c.icon} ${c.name}</a>`;
    let html=`<div class="category" id="${c.id}"><div class="cat-title">${c.icon} ${c.name}</div><div class="cat-desc">${c.desc}</div><div class="tool-grid">`;
    c.tools.forEach(t=>{
      total++;
      const tags=t.tags||[];
      if(tags.includes('paid'))paid++;
      else if(tags.includes('login'))login++;
      else free++;
      html+=`<a class="tool-card" href="${t.u}" target="_blank">
        <div class="tool-name">${t.n}</div>
        <div class="tool-desc">${t.d}</div>
        <div class="tool-tags">${tags.map(tg=>`<span class="tag t-${tg}">${tg==='free'?'Free':tg==='login'?'Login':tg==='paid'?'Paid':tg==='cli'?'CLI Tool':tg==='live'?'Live':tg}</span>`).join('')}</div>
      </a>`;
    });
    html+='</div></div>';
    main.innerHTML+=html;
  });
  document.getElementById('total-count').textContent=total;
  document.getElementById('free-count').textContent=free;
  document.getElementById('login-count').textContent=login;
  document.getElementById('paid-count').textContent=paid;
}

function filterTools(q){
  if(!q){document.querySelectorAll('.tool-card,.category').forEach(el=>el.classList.remove('hidden'));return;}
  const ql=q.toLowerCase();
  document.querySelectorAll('.category').forEach(cat=>{
    let hasVisible=false;
    cat.querySelectorAll('.tool-card').forEach(card=>{
      const match=card.innerText.toLowerCase().includes(ql);
      card.classList.toggle('hidden',!match);
      if(match)hasVisible=true;
    });
    cat.classList.toggle('hidden',!hasVisible);
  });
}

render();
</script>
